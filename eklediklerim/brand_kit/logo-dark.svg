<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 140" width="420" height="140" role="img" aria-label="İnşa Blog Logo">
  <title>İnşa Blog</title>
  <rect width="420" height="140" fill="#162448"/>

  <!-- Corner bracket mark (top-left) -->
  <path d="M18,50 L18,26 L44,26" fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="square"/>
  <!-- Corner bracket mark (top-right) -->
  <path d="M70,26 L70,50" fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="square"/>
  <!-- Corner bracket mark (bottom-left) -->
  <path d="M18,76 L18,100 L44,100" fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="square"/>
  <!-- Corner bracket mark (bottom-right) -->
  <path d="M70,76 L70,100 L44,100" fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="square"/>

  <!-- İB monogram -->
  <text x="26" y="82"
    font-family="'Barlow Condensed', 'Arial Narrow', Arial, sans-serif"
    font-size="48"
    font-weight="600"
    fill="#FFFFFF"
    letter-spacing="-2">İB</text>

  <!-- Vertical divider -->
  <rect x="88" y="28" width="1" height="84" fill="#ffffff20"/>

  <!-- İNŞA main text -->
  <text x="102" y="72"
    font-family="'Cormorant Garamond', 'Palatino Linotype', Georgia, serif"
    font-size="42"
    font-weight="600"
    letter-spacing="5"
    fill="#FFFFFF">İNŞA</text>

  <!-- BLOG subtext -->
  <text x="104" y="96"
    font-family="'Barlow Condensed', 'Arial Narrow', Arial, sans-serif"
    font-size="15"
    font-weight="300"
    letter-spacing="13"
    fill="#C8D8FF">BLOG</text>

  <!-- Thin rule -->
  <rect x="102" y="104" width="260" height="0.8" fill="#ffffff20"/>

  <!-- Tagline -->
  <text x="102" y="118"
    font-family="'Courier New', Courier, monospace"
    font-size="7.5"
    letter-spacing="3"
    fill="#ffffff45">MÜHENDİSLİK · YAPI · ANALİZ</text>
</svg>
